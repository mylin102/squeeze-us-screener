name: Daily Stock Scan

on:
  schedule:
    # 07:30 UTC is 15:30 Taiwan Time (TST)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./squeeze

      - name: Run Squeeze Scan
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_RECIPIENT: ${{ secrets.SMTP_RECIPIENT }}
        run: |
          python -m squeeze scan --export --plot --notify --output-dir squeeze/exports

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update scan results and performance tracker [skip ci]"
          file_pattern: "squeeze/exports/* squeeze/recommendations.csv"
